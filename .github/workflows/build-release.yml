name: Build & Release Windows

# Triggered automatically when a GitHub release is published
on:
  release:
    types: [published]

permissions:
  contents: write   # needed to upload assets to the release

jobs:
  build:
    runs-on: windows-latest   # Windows Server 2022 — includes Inno Setup 6

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Runtime + build deps ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install `
            PyQt6 `
            PyQt6-WebEngine `
            cryptography `
            pyinstaller `
            pillow

      # ── 4. Build (PyInstaller + ZIP + installer) ───────────────────────────
      - name: Build executable
        run: python build.py

      # ── 5. Upload Portable ZIP to the release ──────────────────────────────
      - name: Upload Portable ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: release/*-Portable.zip

      # ── 6. Upload Setup installer (Inno Setup is pre-installed on the runner)
      - name: Upload Setup installer
        uses: softprops/action-gh-release@v2
        with:
          files: release/*-Setup.exe
        continue-on-error: true   # skip silently if Inno Setup build failed
